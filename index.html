<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAYADE - 早出表作成アプリ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        /* 🏎️ 全体の背景にGRヤリスの画像をガチッと固定 */
        body { 
            background-image: url('https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=1000&auto=format&fit=crop'); /* 仮のスポーツカー画像です。お好きな画像URLに変更可能です */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            background-color: #0b0b0b;
        }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            min-height: 100vh; 
            padding-bottom: 80px; /* タブバー用の余白 */
        }

        /* 📋 共通ヘッダー（ホーム以外で表示） */
        .header { 
            height: 60px; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            padding: 0 20px; 
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 90;
        }
        .header h1 { font-size: 18px; font-weight: bold; text-align: center; color: #fff; letter-spacing: 1px; }
        .content { flex: 1; padding: 20px; }
        
        /* 🏠 ホーム画面専用スタイル */
        #page-home {
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .home-brand {
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .home-title {
            font-size: 38px;
            font-weight: 900;
            font-style: italic; /* 斜体でスピード感を演出 */
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .home-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
            font-weight: bold;
        }
        
        /* 🕹️ お手本通りのGR風メニューボタン */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .menu-item {
            background: rgba(26, 26, 26, 0.65); /* 半透明の黒 */
            backdrop-filter: blur(12px); /* すりガラス効果 */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 4px solid #e60012; /* ✨ 左端のGRレッドライン */
            border-radius: 8px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .menu-item:active {
            transform: scale(0.98);
            background: rgba(40, 40, 40, 0.8);
        }
        .menu-main-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .menu-icon-box {
            font-size: 24px;
            width: 40px;
            height: 40px;
            background: rgba(230, 0, 18, 0.15); /* うっすら赤背景 */
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-text-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .menu-title-text {
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .menu-sub-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        .menu-arrow {
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            font-weight: bold;
        }

        /* 🗓️ 各種コンテンツカード（ガラススタイルで統一） */
        .glass-panel {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .section-title { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 12px; font-weight: bold; }

        .toggle-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .toggle-btn { flex: 1; padding: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 15px; font-weight: bold; color: #bbb; cursor: pointer; text-align: center; }
        .toggle-btn.active { border: 2px solid #e60012; color: #fff; background: rgba(230, 0, 12, 0.1); padding: 13px; }
        
        /* 曜日別設定の入力エリア */
        .day-row { display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 14px; margin-bottom: 14px; }
        .day-row:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .day-label { font-size: 14px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 6px; }
        .day-label span { background: #e60012; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 900; }
        .setting-sub-row { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
        .setting-sub-label { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: bold; }
        .select-group { display: flex; gap: 8px; }
        .select-box { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; background: #222; color: #fff; font-weight: bold; }
        .select-box.edu-pos { flex: 0 0 75px; text-align: center; background-color: rgba(230,0,12,0.1); border-color: #e60012; }
        .select-box.edu-member { background-color: rgba(230,0,12,0.1); border-color: #e60012; }
        
        .submit-btn { width: 100%; background: #e60012; color: #fff; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(230,0,12,0.4); margin-bottom: 20px;}
        
        /* 🏁 ホワイトボード（GRレーシング風仕様） */
        .whiteboard-container { display: none; background: #fff; border: 8px solid #222; border-radius: 8px; padding: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 20px rgba(0,0,0,0.5); margin-top: 25px; color: #333; }
        .wb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #222; }
        .wb-badge { border: 2px solid #222; padding: 4px 12px; font-weight: bold; font-size: 16px; border-radius: 4px; background: #222; color: #fff; }
        .wb-title { font-size: 20px; font-weight: 900; letter-spacing: 2px; text-align: center; flex: 1; color: #222; font-style: italic; }
        .wb-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .wb-table th, .wb-table td { border: 1px solid #bdc3c7; text-align: center; padding: 8px 2px; vertical-align: middle; }
        .wb-table th { background-color: #222; color: white; font-size: 14px; font-weight: bold; height: 35px; }
        .wb-table th.day-header { width: 55px; background-color: #e60012; }
        .wb-table td.day-cell { background-color: #e60012; color: white; font-weight: bold; font-size: 14px; }
        
        /* マグネット */
        .magnet-tag { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 6px 2px; font-weight: bold; font-size: 13px; box-shadow: 1px 2px 3px rgba(0,0,0,0.15); display: block; margin: 4px auto; width: 92%; color: #000; border-bottom: 2px solid #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .magnet-tag.absent { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }
        .magnet-tag.education { background: #fffbeb; border: 1px solid #f59e0b; color: #b45309; }
        .wb-footer { margin-top: 15px; padding-top: 8px; border-top: 2px solid #222; font-size: 12px; font-weight: bold; display: flex; align-items: center; }
        .wb-footer-title { background: #222; color: white; padding: 2px 8px; border-radius: 3px; margin-right: 8px; }

        /* 👥 メンバー管理・⚙️ スキル管理用スタイル */
        .member-list-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .member-tag-item { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 8px; color: #fff; }
        .member-delete-btn { color: #ef4444; cursor: pointer; font-size: 16px; font-weight: bold; border: none; background: none; }
        .member-input-group { display: flex; gap: 8px; margin-top: 15px; }
        .member-input { flex: 1; padding: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-size: 15px; font-weight: bold; background: #222; color: #fff; }
        .member-add-btn { background: #22c55e; color: white; border: none; padding: 0 20px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }

        .skill-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 8px; }
        .skill-name { font-weight: bold; font-size: 15px; min-width: 70px; }
        .skill-checkboxes { display: flex; gap: 12px; }
        .skill-label { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .skill-checkbox { width: 18px; height: 18px; accent-color: #e60012; }

        /* 🗺️ ボトムタブバー（グラススタイル） */
        .tab-bar { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px; height: 70px; 
            background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: 5px; z-index: 100; 
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.4); font-size: 11px; gap: 4px; cursor: pointer; flex: 1; height: 100%; justify-content: center; font-weight: bold; }
        .tab-item.active { color: #e60012; }
        
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
<div class="app-container">
    
    <div class="header" id="app-header"><h1 id="app-page-title">🗓️ 早出表作成</h1></div>
    
    <div class="content">
        
        <div id="page-home" class="page active">
            <div class="home-brand">
                <div class="home-title">HAYADE</div>
                <div class="home-subtitle">早出表作成アプリ</div>
            </div>
            
            <div class="menu-list">
                <div class="menu-item" onclick="switchTab('create')">
                    <div class="menu-main-info">
                        <div class="menu-icon-box">📅</div>
                        <div class="menu-text-group">
                            <span class="menu-title-text">早出表を作成</span>
                            <span class="menu-sub-text">1直・2直の早出表を作成します</span>
                        </div>
                    </div>
                    <div class="menu-arrow">＞</div>
                </div>
                
                <div class="menu-item" onclick="switchTab('member')">
                    <div class="menu-main-info">
                        <div class="menu-icon-box">👥</div>
                        <div class="menu-text-group">
                            <span class="menu-title-text">メンバー管理</span>
                            <span class="menu-sub-text">メンバーの追加・編集・削除</span>
                        </div>
                    </div>
                    <div class="menu-arrow">＞</div>
                </div>
                
                <div class="menu-item" onclick="switchTab('skill')">
                    <div class="menu-main-info">
                        <div class="menu-icon-box">🎓</div>
                        <div class="menu-text-group">
                            <span class="menu-title-text">スキル管理</span>
                            <span class="menu-sub-text">メンバーごとの担当スキルを設定</span>
                        </div>
                    </div>
                    <div class="menu-arrow">＞</div>
                </div>
                
                <div class="menu-item" onclick="alert('履歴機能は準備中です！')">
                    <div class="menu-main-info">
                        <div class="menu-icon-box">📄</div>
                        <div class="menu-text-group">
                            <span class="menu-title-text">履歴</span>
                            <span class="menu-sub-text">過去の早出表を確認</span>
                        </div>
                    </div>
                    <div class="menu-arrow">＞</div>
                </div>
            </div>
        </div>

        <div id="page-create" class="page">
            <div class="glass-panel">
                <div class="section-title">勤務を選択してください</div>
                <div class="toggle-container">
                    <button class="toggle-btn active" id="btn-shift1" onclick="selectShift(1)">1直（A～D）</button>
                    <button class="toggle-btn" id="btn-shift2" onclick="selectShift(2)">2直（A～C）</button>
                </div>
            </div>
            
            <div class="glass-panel">
                <div class="section-title">曜日別の設定（休み・教育枠）</div>
                <div id="day-settings-root"></div>
            </div>

            <button class="submit-btn" onclick="generateSchedule()">⚙️ 早出表を作成する</button>
            
            <div class="whiteboard-container" id="whiteboard">
                <div class="wb-header">
                    <div class="wb-badge" id="wb-shift-label">1直</div>
                    <div class="wb-title">WEEKLY SCHEDULE</div>
                    <div style="width: 50px;"></div>
                </div>
                <table class="wb-table">
                    <thead><tr id="wb-thead-tr"></tr></thead>
                    <tbody id="wb-tbody"></tbody>
                </table>
                <div class="wb-footer"><span class="wb-footer-title">メンバー</span><span id="wb-member-list"></span></div>
            </div>
        </div>

        <div id="page-member" class="page">
            <div class="glass-panel">
                <div class="section-title">現在のメンバー（タップで削除）</div>
                <div class="member-list-tags" id="member-tags-container"></div>
                
                <div class="section-title" style="margin-top: 20px;">新しいメンバーを追加</div>
                <div class="member-input-group">
                    <input type="text" class="member-input" id="new-member-name" placeholder="名前を入力">
                    <button class="member-add-btn" onclick="addMember()">追加</button>
                </div>
            </div>
        </div>

        <div id="page-skill" class="page">
            <div class="glass-panel">
                <div class="section-title">設定する勤務（直）を選択</div>
                <div class="toggle-container">
                    <button class="toggle-btn active" id="btn-skill-shift1" onclick="selectSkillShift(1)">1直のスキル</button>
                    <button class="toggle-btn" id="btn-skill-shift2" onclick="selectSkillShift(2)">2直のスキル</button>
                </div>
            </div>
            <div class="glass-panel">
                <div class="section-title" id="skill-page-subtitle">ポジション別スキル設定（1直）</div>
                <div id="skill-list-container"></div>
            </div>
        </div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item active" id="tab-home" onclick="switchTab('home')">🏠<br>ホーム</div>
        <div class="tab-item" id="tab-create" onclick="switchTab('create')">🗓️<br>作成</div>
        <div class="tab-item" id="tab-member" onclick="switchTab('member')">👥<br>メンバー</div>
        <div class="tab-item" id="tab-skill" onclick="switchTab('skill')">⚙️<br>スキル</div>
    </div>
</div>

<script {nonce}>
    let currentShift = 1;
    let skillShift = 1;
    
    let members = ["阿部", "久林", "森上", "岡", "瑠衣", "西村"];
    let memberSkills = {
        "阿部": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "久林": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "森上": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "岡":   { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "瑠衣": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "西村": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] }
    };

    if (localStorage.getItem("hayade_members")) {
        members = JSON.parse(localStorage.getItem("hayade_members"));
    }
    if (localStorage.getItem("hayade_skills")) {
        memberSkills = JSON.parse(localStorage.getItem("hayade_skills"));
    }

    function saveToStorage() {
        localStorage.setItem("hayade_members", JSON.stringify(members));
        localStorage.setItem("hayade_skills", JSON.stringify(memberSkills));
    }
    
    // 🗺️ 画面のタブ切り替えとヘッダー表示の制御
    function switchTab(tabName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        
        const header = document.getElementById('app-header');
        
        if (tabName === 'home') {
            document.getElementById('page-home').classList.add('active');
            document.getElementById('tab-home').classList.add('active');
            header.style.display = 'none'; // ホームのときは上のヘッダーを隠す
        } else {
            header.style.display = 'flex'; // ホーム以外はヘッダーを表示
            document.getElementById(`page-${tabName}`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            if (tabName === 'create') document.getElementById('app-page-title').innerText = '🗓️ 早出表作成';
            if (tabName === 'member') { document.getElementById('app-page-title').innerText = '👥 メンバー管理'; updateMemberUI(); }
            if (tabName === 'skill') { document.getElementById('app-page-title').innerText = '⚙️ スキル管理'; renderSkillUI(); }
        }
        window.scrollTo(0, 0);
    }

    function renderDaySettings() {
        const root = document.getElementById('day-settings-root');
        root.innerHTML = '';
        const days = ["MON", "TUE", "WED", "THU", "FRI"];
        const jpDays = ["月曜日", "火曜日", "水曜日", "木曜日", "金曜日"];
        days.forEach((day, i) => {
            root.innerHTML += `
                <div class="day-row">
                    <div class="day-label"><span>${day}</span> ${jpDays[i]}</div>
                    <div class="setting-sub-row">
                        <div class="setting-sub-label">休み（2人まで）</div>
                        <div class="select-group">
                            <select class="select-box absent-select" data-day="${day}" data-index="1"></select>
                            <select class="select-box absent-select" data-day="${day}" data-index="2"></select>
                        </div>
                    </div>
                    <div class="setting-sub-row">
                        <div class="setting-sub-label">教育枠（見習い追加欄）</div>
                        <div class="select-group">
                            <select class="select-box edu-pos" data-day="${day}"><option value="">なし</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                            <select class="select-box edu-member" data-day="${day}"></select>
                        </div>
                    </div>
                </div>
            `;
        });
        updateMemberUI();
    }

    function selectSkillShift(shift) {
        skillShift = shift;
        document.getElementById('btn-skill-shift1').classList.toggle('active', shift === 1);
        document.getElementById('btn-skill-shift2').classList.toggle('active', shift === 2);
        document.getElementById('skill-page-subtitle').innerText = `ポジション別スキル設定（${shift}直）`;
        renderSkillUI();
    }

    function renderSkillUI() {
        const container = document.getElementById('skill-list-container');
        container.innerHTML = '';
        members.forEach(m => {
            const currentSkills = memberSkills[m][skillShift] || [];
            let checkboxHTML = ["A", "B", "C", "D"].map(pos => {
                if (skillShift === 2 && pos === "D") return "";
                return `<label class="skill-label"><input type="checkbox" class="skill-checkbox" ${currentSkills.includes(pos) ? "checked" : ""} onchange="toggleSkill('${m}', '${pos}')"> ${pos}</label>`;
            }).join('');
            container.innerHTML += `<div class="skill-row"><div class="skill-name">${m}</div><div class="skill-checkboxes">${checkboxHTML}</div></div>`;
        });
    }

    function toggleSkill(name, pos) {
        let list = memberSkills[name][skillShift] || [];
        memberSkills[name][skillShift] = list.includes(pos) ? list.filter(p => p !== pos) : [...list, pos];
        saveToStorage();
    }

    function updateMemberUI() {
        const tags = document.getElementById('member-tags-container');
        if (tags) {
            tags.innerHTML = '';
            members.forEach((m, idx) => { tags.innerHTML += `<div class="member-tag-item">${m}<button class="member-delete-btn" onclick="removeMember(${idx})">×</button></div>`; });
        }
        const setSelect = (cls) => document.querySelectorAll(cls).forEach(s => {
            const val = s.value;
            s.innerHTML = '<option value="">なし</option>' + members.map(m => `<option value="${m}">${m}</option>`).join('');
            s.value = members.includes(val) ? val : "";
        });
        setSelect('.absent-select');
        setSelect('.edu-member');
        document.getElementById('wb-member-list').innerText = members.join('・');
    }

    function addMember() {
        const name = document.getElementById('new-member-name').value.trim();
        if (name && !members.includes(name)) {
            members.push(name);
            memberSkills[name] = { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] };
            document.getElementById('new-member-name').value = '';
            updateMemberUI();
            saveToStorage();
        }
    }

    function removeMember(idx) {
        if (members.length > 1) {
            delete memberSkills[members[idx]];
            members.splice(idx, 1);
            updateMemberUI();
            saveToStorage();
        }
    }

    function selectShift(shift) {
        currentShift = shift;
        document.getElementById('btn-shift1').classList.toggle('active', shift === 1);
        document.getElementById('btn-shift2').classList.toggle('active', shift === 2);
    }

    function swapMagnet(day, pos, index, currentName) {
        const select1 = document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`).value;
        const select2 = document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`).value;
        const absentMembers = [select1, select2].filter(m => m !== "");
        const activeMembers = members.filter(m => !absentMembers.includes(m) && m !== currentName);
        
        if (activeMembers.length === 0) { alert("代わりになれるメンバーがいません。"); return; }
        const newName = prompt(`${day}の${pos}を、${currentName}から誰に入れ替えますか？\n\n【出勤者】\n${activeMembers.join('、')}`, activeMembers[0]);
        
        if (newName && activeMembers.includes(newName)) {
            const spanId = `mag-${day}-${pos}-${index}`;
            const target = document.getElementById(spanId);
            if (target) {
                const isEdu = target.innerText.includes('🔰');
                target.innerText = isEdu ? `🔰 ${newName}` : newName;
            }
        }
    }

    function generateSchedule() {
        const tbody = document.getElementById('wb-tbody');
        const theadTr = document.getElementById('wb-thead-tr');
        const days = ["MON", "TUE", "WED", "THU", "FRI"];
        tbody.innerHTML = '';
        document.getElementById('wb-shift-label').innerText = currentShift + '直';
        const positionNames = currentShift === 1 ? ["A", "B", "C", "D"] : ["A", "B", "C"];
        theadTr.innerHTML = '<th class="day-header"></th>' + positionNames.map(p => `<th>${p}</th>`).join('');
        
        const basePattern = (currentShift === 1) ? 
            { "MON": [0,1,2,3], "TUE": [1,3,5,2], "WED": [5,2,0,1], "THU": [2,5,3,0], "FRI": [3,0,1,5] } :
            { "MON": [3,2,4], "TUE": [1,0,2], "WED": [4,3,0], "THU": [0,1,4], "FRI": [2,1,3] };
        
        days.forEach(day => {
            const tr = document.createElement('tr');
            const tdDay = document.createElement('td');
            tdDay.className = 'day-cell'; tdDay.innerText = day; tr.appendChild(tdDay);
            
            const select1 = document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`).value;
            const select2 = document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`).value;
            const absentMembers = [select1, select2].filter(m => m !== "");
            const activeMembers = members.filter(m => !absentMembers.includes(m));
            
            const eduPos = document.querySelector(`.edu-pos[data-day="${day}"]`).value;
            const eduMember = document.querySelector(`.edu-member[data-day="${day}"]`).value;
            
            let assignments = {}; positionNames.forEach(pos => assignments[pos] = []);
            let normalPool = activeMembers.filter(m => m !== eduMember);
            let indices = basePattern[day] || [0,1,2,3];
            
            positionNames.forEach((pos, i) => {
                if (normalPool.length > 0) {
                    let m = normalPool[indices[i] % normalPool.length];
                    if (memberSkills[m] && memberSkills[m][currentShift] && memberSkills[m][currentShift].includes(pos)) {
                        assignments[pos].push({ name: m, isEdu: false });
                    }
                }
            });
            positionNames.forEach(pos => {
                if (assignments[pos].length === 0) {
                    let c = normalPool.find(m => !assignments[pos].some(a => a.name === m) && memberSkills[m][currentShift] && memberSkills[m][currentShift].includes(pos));
                    assignments[pos].push({ name: c || "調整要", isEdu: false });
                }
            });
            if (eduPos && eduMember && positionNames.includes(eduPos)) {
                positionNames.forEach(pos => assignments[pos] = assignments[pos].filter(item => item.name !== eduMember));
                assignments[eduPos].push({ name: eduMember, isEdu: true });
            }
            positionNames.forEach(pos => {
                const td = document.createElement('td');
                assignments[pos].forEach((item, idx) => {
                    const span = document.createElement('span');
                    span.id = `mag-${day}-${pos}-${idx}`;
                    span.className = 'magnet-tag' + (item.isEdu ? ' education' : '');
                    span.innerText = item.isEdu ? `🔰 ${item.name}` : item.name;
                    span.onclick = () => swapMagnet(day, pos, idx, item.name);
                    td.appendChild(span);
                });
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        document.getElementById('whiteboard').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    renderDaySettings();
</script>
</body>
</html>
