<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GR TRACK MANAGER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=1000&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; display: flex; justify-content: center; min-height: 100vh; background-color: #0b0b0b;
        }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; padding: 20px 20px 100px 20px; }
        .app-header-fixed { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; text-align: center; font-size: 18px; font-weight: bold; margin: -20px -20px 20px -20px; position: sticky; top: 0; z-index: 100; }
        .brand-section { margin: 10px 4px 25px 4px; }
        .brand-title { font-size: 32px; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
        .brand-subtitle { font-size: 12px; color: rgba(255, 255, 255, 0.6); margin-top: 2px; font-weight: bold; }
        .menu-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 25px; }
        .menu-item { background: rgba(26, 26, 26, 0.75); border: 1px solid rgba(255, 255, 255, 0.08); border-left: 4px solid #e60012; border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
        .menu-icon-box { font-size: 20px; width: 38px; height: 38px; background: rgba(255, 255, 255, 0.08); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .glass-panel { background: rgba(22, 22, 22, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
        .section-title { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 14px; font-weight: bold; }
        .toggle-container { display: flex; gap: 12px; }
        .toggle-btn { flex: 1; padding: 14px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer; text-align: center; }
        .toggle-btn.active { border: 2px solid #e60012; color: #fff; background: rgba(230, 0, 12, 0.1); }
        .submit-btn { width: 100%; background: #e60012; color: #fff; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .show-edu-container { display: flex; align-items: center; gap: 10px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .day-row { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 16px; margin-bottom: 16px; }
        .select-box { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: #1a1a1a; color: #fff; font-weight: bold; }
        .whiteboard-container { display: none; background: #fff; border: 6px solid #222; border-radius: 8px; padding: 10px; color: #333; margin-bottom: 25px; }
        .wb-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .wb-table th, .wb-table td { border: 1px solid #bdc3c7; text-align: center; padding: 6px 2px; }
        .wb-table th { background-color: #222; color: white; font-size: 13px; }
        .wb-table td.day-cell { background-color: #e60012; color: white; font-weight: bold; }
        .magnet-tag { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 6px 2px; font-weight: bold; font-size: 13px; display: block; margin: 4px auto; width: 92%; cursor: pointer; border-bottom: 2px solid #b3b3b3; }
        .magnet-tag.education { background: #fffbeb; border: 1px solid #f59e0b; color: #b45309; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1c1c1c; border-radius: 12px; width: 100%; max-width: 400px; padding: 20px; color: #fff; }
        .swap-item { padding: 12px; background: #333; margin: 6px 0; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; color: white; }
        .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 65px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header-fixed">🗓️ 早出表作成</div>
    <div class="brand-section">
        <div class="brand-title">GR TRACK MANAGER</div>
        <div class="brand-subtitle">POWERED BY TOYOTA GAZOO Racing STYLE</div>
    </div>
    
    <div class="menu-list">
        <div class="menu-item" onclick="openModal('member')"><div class="menu-main-info"><div class="menu-icon-box">👥</div><div class="menu-text-group">メンバー管理</div></div></div>
        <div class="menu-item" onclick="openModal('skill')"><div class="menu-main-info"><div class="menu-icon-box">🎓</div><div class="menu-text-group">スキル管理</div></div></div>
    </div>

    <div class="glass-panel">
        <div class="section-title">勤務を選択</div>
        <div class="toggle-container">
            <button class="toggle-btn active" id="btn-shift1" onclick="selectShift(1)">1直</button>
            <button class="toggle-btn" id="btn-shift2" onclick="selectShift(2)">2直</button>
        </div>
    </div>

    <div class="whiteboard-container" id="whiteboard">
        <table class="wb-table">
            <thead><tr id="wb-thead-tr"></tr></thead>
            <tbody id="wb-tbody"></tbody>
        </table>
    </div>

    <button class="submit-btn" onclick="generateSchedule()">⚙️ 早出表を作成する</button>

    <label class="show-edu-container">
        <input type="checkbox" id="toggle-edu-view" onchange="toggleEduVisibility()"> 🔰 教育枠を表示
    </label>
    
    <div class="glass-panel">
        <div class="section-title">曜日別休み設定</div>
        <div id="day-settings-root"></div>
    </div>

    <div class="modal-overlay" id="modal-swap" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:15px; border-left:3px solid #e60012; padding-left:8px;">誰に入れ替えますか？</h3>
            <div id="swap-member-list"></div>
        </div>
    </div>

    <div id="modal-member" class="modal-overlay">...</div>
    <div id="modal-skill" class="modal-overlay">...</div>
</div>

<script>
    let currentShift = 1, members = ["阿部", "久林", "森上", "岡", "瑠衣", "西村"], swapParams = {};
    let memberSkills = { "阿部": {1:["A","B","C","D"], 2:["A","B","C"]}, "久林": {1:["A","B","C","D"], 2:["A","B","C"]}, "森上": {1:["A","B","C","D"], 2:["A","B","C"]}, "岡": {1:["A","B","C","D"], 2:["A","B","C"]}, "瑠衣": {1:["A","B","C","D"], 2:["A","B","C"]}, "西村": {1:["A","B","C","D"], 2:["A","B","C"]} };

    // 交代用ロジック（ここを差し替えました）
    function swapMagnet(day, pos, index, currentName) {
        const absent = [document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`).value, document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`).value];
        const candidates = members.filter(m => !absent.includes(m) && m !== currentName);
        if(candidates.length === 0) { alert("交代候補がいません"); return; }
        swapParams = { day, pos, index };
        document.getElementById('swap-member-list').innerHTML = candidates.map(m => `<div class="swap-item" onclick="executeSwap('${m}')">${m}</div>`).join('');
        document.getElementById('modal-swap').style.display = 'flex';
    }

    function executeSwap(newName) {
        const { day, pos, index } = swapParams;
        const target = document.getElementById(`mag-${day}-${pos}-${index}`);
        if(target) target.innerText = target.innerText.includes('🔰') ? `🔰 ${newName}` : newName;
        document.getElementById('modal-swap').style.display = 'none';
    }

    // （以下、generateSchedule や他の既存関数をすべて記述してください）
</script>
</body>
</html>
