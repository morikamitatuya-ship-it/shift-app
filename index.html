<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GR TRACK MANAGER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        /* 🏎️ 背景にGRヤリスの画像を固定（薄暗くして文字を見やすく） */
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            background-color: #0b0b0b;
        }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            padding: 20px 20px 100px 20px; /* 下部タブバー用の余白 */
        }

        /* 🗓️ 上部固定ヘッダー（image_6.png, image_7.pngのスタイル） */
        .app-header-fixed {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: -20px -20px 20px -20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 🔥 脱・ダサいタイトル！スポーツカー感全開のメインロゴ */
        .brand-section {
            margin: 10px 4px 25px 4px;
        }
        .brand-title {
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .brand-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* 🕹️ image_7.pngのメニューデザインを完全再現 */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 25px;
        }
        .menu-item {
            background: rgba(26, 26, 26, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 4px solid #e60012;
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .menu-main-info { display: flex; align-items: center; gap: 16px; }
        .menu-icon-box {
            font-size: 20px;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-text-group { display: flex; flex-direction: column; gap: 3px; }
        .menu-title-text { font-size: 16px; font-weight: bold; }
        .menu-sub-text { font-size: 11px; color: rgba(255, 255, 255, 0.4); }
        .menu-arrow { color: rgba(255, 255, 255, 0.3); font-size: 16px; font-weight: bold; }

        /* 📦 半透明のグラステイストパネル（image_7.pngの下部枠） */
        .glass-panel {
            background: rgba(22, 22, 22, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .section-title { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 14px; font-weight: bold; }

        /* 🔘 1直・2直のトグルスイッチ */
        .toggle-container { display: flex; gap: 12px; }
        .toggle-btn { flex: 1; padding: 14px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer; text-align: center; }
        .toggle-btn.active { border: 2px solid #e60012; color: #fff; background: rgba(230, 0, 12, 0.1); padding: 13px; }
        
        /* 🚀 デカ赤ボタン：早出表を作成する（image_6.png完全再現） */
        .submit-btn { 
            width: 100%; 
            background: #e60012; 
            color: #fff; 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            cursor: pointer; 
            box-shadow: 0 6px 20px rgba(230,0,12,0.4); 
            margin-bottom: 20px;
        }
        
        /* 🔰 教育枠チェッカーの見栄え改善（背景が白くなっても絶対に見えるように黒帯化） */
        .show-edu-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            font-size: 14px; 
            font-weight: bold; 
            color: #fff;
            cursor: pointer; 
        }
        .show-edu-checkbox { width: 18px; height: 18px; accent-color: #e60012; cursor: pointer; }

        /* 📅 曜日設定エリア */
        .day-row { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 16px; margin-bottom: 16px; }
        .day-row:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .day-label { font-size: 14px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 8px; }
        .day-label span { background: #e60012; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 900; }
        .setting-sub-row { display: flex; flex-direction: column; gap: 6px; }
        .setting-sub-row.edu-row { display: none; margin-top: 4px; } /* 初期状態非表示 */
        .setting-sub-label { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: bold; }
        .select-group { display: flex; gap: 8px; }
        .select-box { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); font-size: 14px; background: #1a1a1a; color: #fff; font-weight: bold; }
        .select-box.edu-pos { flex: 0 0 70px; text-align: center; background-color: rgba(230,0,12,0.15); border-color: #e60012; }
        .select-box.edu-member { background-color: rgba(230,0,12,0.15); border-color: #e60012; }
        
        /* 🏁 完成版ホワイトボード（一番下にニュッとスマートに出現） */
        .whiteboard-container { display: none; background: #fff; border: 6px solid #222; border-radius: 8px; padding: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 4px 25px rgba(0,0,0,0.6); margin-top: 10px; margin-bottom: 25px; color: #333; }
        .wb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #222; }
        .wb-badge { border: 2px solid #222; padding: 3px 10px; font-weight: bold; font-size: 14px; border-radius: 4px; background: #222; color: #fff; }
        .wb-title { font-size: 18px; font-weight: 900; letter-spacing: 2px; text-align: center; flex: 1; color: #222; font-style: italic; }
        .wb-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .wb-table th, .wb-table td { border: 1px solid #bdc3c7; text-align: center; padding: 6px 2px; vertical-align: middle; }
        .wb-table th { background-color: #222; color: white; font-size: 13px; font-weight: bold; height: 32px; }
        .wb-table th.day-header { width: 50px; background-color: #e60012; }
        .wb-table td.day-cell { background-color: #e60012; color: white; font-weight: bold; font-size: 13px; }
        
        /* マグネット */
        .magnet-tag { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 6px 2px; font-weight: bold; font-size: 13px; box-shadow: 1px 2px 3px rgba(0,0,0,0.15); display: block; margin: 4px auto; width: 92%; color: #000; border-bottom: 2px solid #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .magnet-tag.education { background: #fffbeb; border: 1px solid #f59e0b; color: #b45309; }
        .wb-footer { margin-top: 12px; padding-top: 8px; border-top: 2px solid #222; font-size: 11px; font-weight: bold; display: flex; align-items: center; }
        .wb-footer-title { background: #222; color: white; padding: 2px 6px; border-radius: 3px; margin-right: 6px; }

        /* 🗺️ ボトムナビゲーションバー（image_6.pngデザイン再現） */
        .tab-bar { 
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 65px; 
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: 4px; z-index: 100; 
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.4); font-size: 11px; gap: 3px; cursor: pointer; flex: 1; height: 100%; justify-content: center; font-weight: bold; }
        .tab-item.active { color: #e60012; }

        /* モーダル（ポップアップ裏画面用） */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1c1c1c; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; width: 100%; max-width: 450px; padding: 20px; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .modal-close { background: #444; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; float: right; margin-top: 15px; }
        
        /* 管理画面用パーツ */
        .member-list-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .member-tag-item { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .member-delete-btn { color: #ef4444; border: none; background: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .member-input-group { display: flex; gap: 8px; }
        .member-input { flex: 1; padding: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: #222; color: #fff; font-weight: bold; }
        .member-add-btn { background: #22c55e; color: white; border: none; padding: 0 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .skill-scroll-box { max-height: 300px; overflow-y: auto; padding-right: 4px; }
        .skill-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); padding: 10px 12px; border-radius: 6px; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.06); }
        .skill-name { font-weight: bold; font-size: 14px; }
        .skill-checkboxes { display: flex; gap: 10px; }
        .skill-label { font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .skill-checkbox { width: 16px; height: 16px; accent-color: #e60012; }
    </style>
</head>
<body>
<div class="app-container">
    
    <!-- 固定ヘッダー -->
    <div class="app-header-fixed">🗓️ 早出表作成</div>
    
    <!-- 🏁 メインロゴ（HAYADEからアップグレード） -->
    <div class="brand-section">
        <div class="brand-title">GR TRACK MANAGER</div>
        <div class="brand-subtitle">POWERED BY TOYOTA GAZOO Racing STYLE</div>
    </div>
    
    <!-- 🕹️ メインメニューリスト（ここから各種ポップアップが開きます） -->
    <div class="menu-list">
        <div class="menu-item" style="cursor: default; background: rgba(40,40,40,0.4);">
            <div class="menu-main-info">
                <div class="menu-icon-box" style="color: #e60012;">📅</div>
                <div class="menu-text-group">
                    <span class="menu-title-text" style="color: #fff;">早出表を作成</span>
                    <span class="menu-sub-text">直・休み・教育枠を選んで下で作成</span>
                </div>
            </div>
        </div>
        
        <div class="menu-item" style="cursor: pointer;" onclick="openModal('member')">
            <div class="menu-main-info">
                <div class="menu-icon-box">👥</div>
                <div class="menu-text-group">
                    <span class="menu-title-text">メンバー管理</span>
                    <span class="menu-sub-text">メンバーの追加・削除はこちら</span>
                </div>
            </div>
            <div class="menu-arrow">＞</div>
        </div>
        
        <div class="menu-item" style="cursor: pointer;" onclick="openModal('skill')">
            <div class="menu-main-info">
                <div class="menu-icon-box">🎓</div>
                <div class="menu-text-group">
                    <span class="menu-title-text">スキル管理</span>
                    <span class="menu-sub-text">ポジションごとの対応可否を設定</span>
                </div>
            </div>
            <div class="menu-arrow">＞</div>
        </div>
    </div>

    <!-- 🗳️ 勤務選択パネル（image_7.pngの下部を完全再現） -->
    <div class="glass-panel">
        <div class="section-title">勤務を選択してください</div>
        <div class="toggle-container">
            <button class="toggle-btn active" id="btn-shift1" onclick="selectShift(1)">1直（A～D）</button>
            <button class="toggle-btn" id="btn-shift2" onclick="selectShift(2)">2直（A～C）</button>
        </div>
    </div>

    <!-- 🏁 完成版ホワイトボード（ボタンを押すとこの位置にバシッと出現！） -->
    <div class="whiteboard-container" id="whiteboard">
        <div class="wb-header">
            <div class="wb-badge" id="wb-shift-label">1直</div>
            <div class="wb-title">WEEKLY SCHEDULE</div>
            <div style="width: 45px;"></div>
        </div>
        <table class="wb-table">
            <thead><tr id="wb-thead-tr"></tr></thead>
            <tbody id="wb-tbody"></tbody>
        </table>
        <div class="wb-footer"><span class="wb-footer-title">メンバー</span><span id="wb-member-list"></span></div>
    </div>

    <!-- 🚀 作成ボタン（image_6.pngのデカ赤ボタン） -->
    <button class="submit-btn" onclick="generateSchedule()">⚙️ 早出表を作成する</button>

    <!-- 🔰 教育枠表示スイッチ -->
    <label class="show-edu-container">
        <input type="checkbox" class="show-edu-checkbox" id="toggle-edu-view" onchange="toggleEduVisibility()">
        🔰 教育枠（見習い追加欄）を表示する
    </label>
    
    <!-- 📅 曜日別の休み設定（image_6.pngの部分） -->
    <div class="glass-panel">
        <div class="section-title">曜日別の設定（休み欄）</div>
        <div id="day-settings-root"></div>
    </div>

    <!-- 👥 ポップアップ裏画面：メンバー管理 -->
    <div class="modal-overlay" id="modal-member" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; border-left: 3px solid #e60012; padding-left: 8px;">👥 メンバー管理</h3>
            <div class="section-title">現在のメンバー（×で削除）</div>
            <div class="member-list-tags" id="member-tags-container"></div>
            <div class="member-input-group">
                <input type="text" class="member-input" id="new-member-name" placeholder="名前を入力">
                <button class="member-add-btn" onclick="addMember()">追加</button>
            </div>
            <button class="modal-close" onclick="closeModal('member')">閉じる</button>
        </div>
    </div>

    <!-- ⚙️ ポップアップ裏画面：スキル管理 -->
    <div class="modal-overlay" id="modal-skill" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <h3 style="margin-bottom: 12px; border-left: 3px solid #e60012; padding-left: 8px;">⚙️ スキル管理</h3>
            <div class="toggle-container" style="margin-bottom: 12px;">
                <button class="toggle-btn active" id="btn-skill-shift1" onclick="selectSkillShift(1)" style="padding: 8px;">1直</button>
                <button class="toggle-btn" id="btn-skill-shift2" onclick="selectSkillShift(2)" style="padding: 8px;">2直</button>
            </div>
            <div class="skill-scroll-box" id="skill-list-container"></div>
            <button class="modal-close" onclick="closeModal('skill')">閉じる</button>
        </div>
    </div>

    <!-- 🗺️ ボトムナビゲーション（お飾りですがデザインの引き締めに配置） -->
    <div class="tab-bar">
        <div class="tab-item" onclick="window.scrollTo({top:0, behavior:'smooth'})">🏠<br>ホーム</div>
        <div class="tab-item active">🗓️<br>作成</div>
        <div class="tab-item" onclick="openModal('member')">👥<br>メンバー</div>
        <div class="tab-item" onclick="openModal('skill')">⚙️<br>スキル</div>
    </div>
</div>

<script {nonce}>
    let currentShift = 1;
    let skillShift = 1;
    
    let members = ["阿部", "久林", "森上", "岡", "瑠衣", "西村"];
    let memberSkills = {
        "阿部": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "久林": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "森上": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "岡":   { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "瑠衣": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "西村": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] }
    };

    if (localStorage.getItem("gr_members")) members = JSON.parse(localStorage.getItem("gr_members"));
    if (localStorage.getItem("gr_skills")) memberSkills = JSON.parse(localStorage.getItem("gr_skills"));

    function saveToStorage() {
        localStorage.setItem("gr_members", JSON.stringify(members));
        localStorage.setItem("gr_skills", JSON.stringify(memberSkills));
    }

    // 📋 ポップアップ画面の制御
    function openModal(id) {
        document.getElementById(`modal-${id}`).style.display = 'flex';
        if (id === 'member') updateMemberUI();
        if (id === 'skill') renderSkillUI();
    }
    function closeModal(id) { document.getElementById(`modal-${id}`).style.display = 'none'; }
    function closeModalOnOverlay(e) { if (e.target.classList.contains('modal-overlay')) { e.target.style.display = 'none'; } }

    function toggleEduVisibility() {
        const isChecked = document.getElementById('toggle-edu-view').checked;
        document.querySelectorAll('.setting-sub-row.edu-row').forEach(row => { row.style.display = isChecked ? 'flex' : 'none'; });
    }

    function renderDaySettings() {
        const root = document.getElementById('day-settings-root');
        root.innerHTML = '';
        const days = ["MON", "TUE", "WED", "THU", "FRI"];
        const jpDays = ["月曜日", "火曜日", "水曜日", "木曜日", "金曜日"];
        days.forEach((day, i) => {
            root.innerHTML += `
                <div class="day-row">
                    <div class="day-label"><span>${day}</span> ${jpDays[i]}</div>
                    <div class="setting-sub-row">
                        <div class="setting-sub-label">休み（2人まで）</div>
                        <div class="select-group">
                            <select class="select-box absent-select" data-day="${day}" data-index="1"></select>
                            <select class="select-box absent-select" data-day="${day}" data-index="2"></select>
                        </div>
                    </div>
                    <div class="setting-sub-row edu-row">
                        <div class="setting-sub-label">教育枠（見習い追加欄）</div>
                        <div class="select-group">
                            <select class="select-box edu-pos" data-day="${day}"><option value="">なし</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                            <select class="select-box edu-member" data-day="${day}"></select>
                        </div>
                    </div>
                </div>
            `;
        });
        updateMemberUI();
    }

    function selectSkillShift(shift) {
        skillShift = shift;
        document.getElementById('btn-skill-shift1').classList.toggle('active', shift === 1);
        document.getElementById('btn-skill-shift2').classList.toggle('active', shift === 2);
        renderSkillUI();
    }

    function renderSkillUI() {
        const container = document.getElementById('skill-list-container');
        container.innerHTML = '';
        members.forEach(m => {
            const currentSkills = memberSkills[m][skillShift] || [];
            let checkboxHTML = ["A", "B", "C", "D"].map(pos => {
                if (skillShift === 2 && pos === "D") return "";
                return `<label class="skill-label"><input type="checkbox" class="skill-checkbox" ${currentSkills.includes(pos) ? "checked" : ""} onchange="toggleSkill('${m}', '${pos}')"> ${pos}</label>`;
            }).join('');
            container.innerHTML += `<div class="skill-row"><div class="skill-name">${m}</div><div class="skill-checkboxes">${checkboxHTML}</div></div>`;
        });
    }

    function toggleSkill(name, pos) {
        let list = memberSkills[name][skillShift] || [];
        memberSkills[name][skillShift] = list.includes(pos) ? list.filter(p => p !== pos) : [...list, pos];
        saveToStorage();
    }

    function updateMemberUI() {
        const tags = document.getElementById('member-tags-container');
        if (tags) {
            tags.innerHTML = '';
            members.forEach((m, idx) => { tags.innerHTML += `<div class="member-tag-item">${m}<button class="member-delete-btn" onclick="removeMember(${idx})">×</button></div>`; });
        }
        document.querySelectorAll('.absent-select, .edu-member').forEach(s => {
            const val = s.value;
            s.innerHTML = '<option value="">なし</option>' + members.map(m => `<option value="${m}">${m}</option>`).join('');
            s.value = members.includes(val) ? val : "";
        });
        document.getElementById('wb-member-list').innerText = members.join('・');
    }

    function addMember() {
        const name = document.getElementById('new-member-name').value.trim();
        if (name && !members.includes(name)) {
            members.push(name);
            memberSkills[name] = { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] };
            document.getElementById('new-member-name').value = '';
            updateMemberUI();
            saveToStorage();
        }
    }

    function removeMember(idx) {
        if (members.length > 1) {
            delete memberSkills[members[idx]];
            members.splice(idx, 1);
            updateMemberUI();
            saveToStorage();
        }
    }

    function selectShift(shift) {
        currentShift = shift;
        document.getElementById('btn-shift1').classList.toggle('active', shift === 1);
        document.getElementById('btn-shift2').classList.toggle('active', shift === 2);
    }

    function swapMagnet(day, pos, index, currentName) {
        const select1 = document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`).value;
        const select2 = document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`).value;
        const absentMembers = [select1, select2].filter(m => m !== "");
        const activeMembers = members.filter(m => !absentMembers.includes(m) && m !== currentName);
        
        if (activeMembers.length === 0) { alert("代わりになれるメンバーがいません。"); return; }
        const newName = prompt(`${day}の${pos}を、${currentName}から誰に入れ替えますか？`, activeMembers[0]);
        
        if (newName && activeMembers.includes(newName)) {
            const target = document.getElementById(`mag-${day}-${pos}-${index}`);
            if (target) {
                const isEdu = target.innerText.includes('🔰');
                target.innerText = isEdu ? `🔰 ${newName}` : newName;
            }
        }
    }

    function generateSchedule() {
        const tbody = document.getElementById('wb-tbody');
        const theadTr = document.getElementById('wb-thead-tr');
        const days = ["MON", "TUE", "WED", "THU", "FRI"];
        tbody.innerHTML = '';
        document.getElementById('wb-shift-label').innerText = currentShift + '直';
        const positionNames = currentShift === 1 ? ["A", "B", "C", "D"] : ["A", "B", "C"];
        theadTr.innerHTML = '<th class="day-header"></th>' + positionNames.map(p => `<th>${p}</th>`).join('');
        
        const basePattern = (currentShift === 1) ? 
            { "MON": [0,1,2,3], "TUE": [1,3,5,2], "WED": [5,2,0,1], "THU": [2,5,3,0], "FRI": [3,0,1,5] } :
            { "MON": [3,2,4], "TUE": [1,0,2], "WED": [4,3,0], "THU": [0,1,4], "FRI": [2,1,3] };
        
        days.forEach(day => {
            const tr = document.createElement('tr');
            const tdDay = document.createElement('td');
            tdDay.className = 'day-cell'; tdDay.innerText = day; tr.appendChild(tdDay);
            
            const select1 = document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`).value;
            const select2 = document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`).value;
            const absentMembers = [select1, select2].filter(m => m !== "");
            const activeMembers = members.filter(m => !absentMembers.includes(m));
            
            const isEduVisible = document.getElementById('toggle-edu-view').checked;
            const eduPos = isEduVisible ? document.querySelector(`.edu-pos[data-day="${day}"]`).value : "";
            const eduMember = isEduVisible ? document.querySelector(`.edu-member[data-day="${day}"]`).value : "";
            
            let assignments = {}; positionNames.forEach(pos => assignments[pos] = []);
            let normalPool = activeMembers.filter(m => m !== eduMember);
            let indices = basePattern[day] || [0,1,2,3];
            
            positionNames.forEach((pos, i) => {
                if (normalPool.length > 0) {
                    let m = normalPool[indices[i] % normalPool.length];
                    if (memberSkills[m] && memberSkills[m][currentShift] && memberSkills[m][currentShift].includes(pos)) {
                        assignments[pos].push({ name: m, isEdu: false });
                    }
                }
            });
            positionNames.forEach(pos => {
                if (assignments[pos].length === 0) {
                    let c = normalPool.find(m => !assignments[pos].some(a => a.name === m) && memberSkills[m][currentShift] && memberSkills[m][currentShift].includes(pos));
                    assignments[pos].push({ name: c || "調整要", isEdu: false });
                }
            });
            if (eduPos && eduMember && positionNames.includes(eduPos)) {
                positionNames.forEach(pos => assignments[pos] = assignments[pos].filter(item => item.name !== eduMember));
                assignments[eduPos].push({ name: eduMember, isEdu: true });
            }
            positionNames.forEach(pos => {
                const td = document.createElement('td');
                assignments[pos].forEach((item, idx) => {
                    const span = document.createElement('span');
                    span.id = `mag-${day}-${pos}-${idx}`;
                    span.className = 'magnet-tag' + (item.isEdu ? ' education' : '');
                    span.innerText = item.isEdu ? `🔰 ${item.name}` : item.name;
                    span.onclick = () => swapMagnet(day, pos, idx, item.name);
                    td.appendChild(span);
                });
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        
        // ボードをスッとその場に表示
        document.getElementById('whiteboard').style.display = 'block';
    }

    renderDaySettings();
</script>
</body>
</html>
