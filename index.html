<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACK MANAGER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Impact', 'Arial Black', 'Helvetica Neue', Arial, sans-serif; }
        
        /* 🏎️ 背景にGRヤリスを固定（さらに暗くして有機ELディスプレイ風に） */
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            background-color: #050505;
            overflow-x: hidden;
        }

        /* 画面内に絶対収めるコンテナ */
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            display: flex; 
            flex-direction: column; 
            padding: 15px 15px 85px 15px;
            gap: 12px;
        }

        /* 🗓️ 上部固定ヘッダー */
        .app-header-fixed {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 2px solid #e60012;
            padding: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: -15px -15px 5px -15px;
            position: sticky;
            top: 0;
            z-index: 100;
            color: #fff;
        }

        /* 🔥 文字タイトルを廃止：硬派なGR風インジケーターライン */
        .brand-indicator {
            display: flex;
            height: 6px;
            width: 100%;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
            box-shadow: 0 2px 10px rgba(230, 0, 12, 0.3);
        }
        .line-black { flex: 2; background: #111; }
        .line-white { flex: 1; background: #fff; }
        .line-red   { flex: 3; background: #e60012; }
        
        /* 🏁 メーター＆カーボン調の特製コックピットパネル */
        .carbon-panel {
            /* カーボン調パターンのCSS表現 */
            background: linear-gradient(27deg, #151515 5px, transparent 5px) 0 5px,
                        linear-gradient(207deg, #151515 5px, transparent 5px) 10px 0,
                        linear-gradient(27deg, #222 5px, transparent 5px) 0 10px,
                        linear-gradient(207deg, #222 5px, transparent 5px) 10px 5px,
                        linear-gradient(90deg, #1b1b1b 10px, transparent 10px),
                        linear-gradient(#1c1c1c 25%, #1a1a1a 25%, #1a1a1a 50%, transparent 50%, transparent 75%, #242424 75%, #242424);
            background-size: 20px 20px;
            background-color: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #e60012; /* メーター風の赤いアクセント */
            border-radius: 8px;
            padding: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            position: relative;
        }
        .carbon-panel::before {
            content: ''; position: absolute; top: 2px; right: 8px; font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 1px;
        }

        .section-title { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; display: flex; justify-content: space-between; }

        /* 🔘 シフトポジション風・直切り替え（LEDランプ風エフェクト） */
        .shift-select-container { display: flex; gap: 10px; }
        .shift-btn { 
            flex: 1; padding: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.4); 
            border-radius: 6px; font-size: 14px; font-weight: bold; color: #aaa; cursor: pointer; text-align: center;
            transition: all 0.2s ease; position: relative;
        }
        .shift-btn.active { 
            border-color: #e60012; color: #fff; background: rgba(230, 0, 12, 0.15);
            box-shadow: inset 0 0 8px rgba(230,0,12,0.3);
        }
        /* アクティブ時に点灯するLEDインジケーター */
        .shift-btn.active::after {
            content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 3px; background: #e60012; border-radius: 2px; box-shadow: 0 0 6px #e60012;
        }
        
        /* 📅 劇的改善：スクロールを消し去る曜日別横タブ */
        .day-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
        .day-tab-item { 
            flex: 1; padding: 10px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 5px; font-size: 12px; font-weight: 900; color: #888; text-align: center; cursor: pointer;
        }
        .day-tab-item.active { 
            background: #e60012; color: #fff; border-color: #e60012; box-shadow: 0 3px 10px rgba(230,0,12,0.4);
        }

        /* 曜日ごとの中身（選ばれた曜日だけその場に表示） */
        .day-content-panel { display: none; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }
        .day-content-panel.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

        .setting-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .setting-row:last-child { margin-bottom: 0; }
        .setting-label { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: bold; }
        
        .select-group { display: flex; gap: 8px; }
        .select-box { 
            flex: 1; padding: 10px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.15); 
            font-size: 13px; background: #111; color: #fff; font-weight: bold; outline: none;
        }
        /* 教育枠用の識別カラー */
        .select-box.edu-pos { flex: 0 0 65px; text-align: center; border-color: rgba(230,0,12,0.4); color: #e60012; }
        .select-box.edu-member { border-color: rgba(230,0,12,0.4); }

        /* 🔰 教育枠表示チェック */
        .edu-toggle-bar {
            display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); 
            padding: 10px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; color: rgba(255,255,255,0.8); cursor: pointer;
            border: 1px solid rgba(255,255,255,0.08); margin-top: 8px;
        }
        .edu-checkbox { width: 16px; height: 16px; accent-color: #e60012; cursor: pointer; }

        /* 🚀 デカ赤ボタン：レーシングカーのスターター風 */
        .engine-start-btn { 
            width: 100%; background: #e60012; color: #fff; border: none; padding: 14px; 
            border-radius: 6px; font-size: 15px; font-weight: bold; display: flex; align-items: center; 
            justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(230,0,12,0.4);
            border-bottom: 3px solid #b3000d; letter-spacing: 1px;
        }
        .engine-start-btn:active { transform: translateY(2px); border-bottom-width: 1px; }
        
        /* 🏁 完成版ホワイトボード（デザイン完全維持） */
        .whiteboard-container { 
            display: none; background: #fff; border: 5px solid #222; border-radius: 6px; 
            padding: 8px; box-shadow: inset 0 0 8px rgba(0,0,0,0.1), 0 4px 20px rgba(0,0,0,0.6); color: #333; 
        }
        .wb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid #222; }
        .wb-badge { border: 2px solid #222; padding: 2px 8px; font-weight: bold; font-size: 12px; border-radius: 3px; background: #222; color: #fff; }
        .wb-title { font-size: 15px; font-weight: 900; letter-spacing: 2px; text-align: center; flex: 1; color: #222; font-style: italic; }
        .wb-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .wb-table th, .wb-table td { border: 1px solid #bdc3c7; text-align: center; padding: 5px 2px; vertical-align: middle; }
        .wb-table th { background-color: #222; color: white; font-size: 12px; font-weight: bold; height: 28px; }
        .wb-table th.day-header { width: 45px; background-color: #e60012; }
        .wb-table td.day-cell { background-color: #e60012; color: white; font-weight: bold; font-size: 12px; }
        
        /* マグネット */
        .magnet-tag { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 5px 2px; font-weight: bold; font-size: 12px; box-shadow: 1px 2px 3px rgba(0,0,0,0.15); display: block; margin: 3px auto; width: 92%; color: #000; border-bottom: 2px solid #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .magnet-tag.education { background: #fffbeb; border: 1px solid #f59e0b; color: #b45309; }
        .wb-footer { margin-top: 10px; padding-top: 6px; border-top: 2px solid #222; font-size: 10px; font-weight: bold; display: flex; align-items: center; }
        .wb-footer-title { background: #222; color: white; padding: 1px 5px; border-radius: 2px; margin-right: 5px; }

        /* 🛠️ 管理系ショートカットメニュー（スッキリ化） */
        .shortcut-grid { display: flex; gap: 10px; }
        .shortcut-item {
            flex: 1; background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; padding: 10px; display: flex; align-items: center; justify-content: center;
            gap: 8px; font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 🗺️ ボトムメニューバー */
        .tab-bar { 
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 60px; 
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: 4px; z-index: 100; 
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.4); font-size: 10px; gap: 2px; cursor: pointer; flex: 1; height: 100%; justify-content: center; font-weight: bold; }
        .tab-item.active { color: #e60012; }

        /* 裏モーダル画面 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); z-index: 200; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: #151515; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; width: 100%; max-width: 420px; padding: 18px; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .modal-close { background: #333; color: #fff; border: none; padding: 8px 14px; border-radius: 5px; font-weight: bold; cursor: pointer; float: right; margin-top: 15px; font-size: 12px; }
        
        .member-list-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .member-tag-item { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .member-delete-btn { color: #ef4444; border: none; background: none; font-weight: bold; cursor: pointer; font-size: 13px; }
        .member-input-group { display: flex; gap: 6px; }
        .member-input { flex: 1; padding: 8px; border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; background: #000; color: #fff; font-weight: bold; font-size: 13px; }
        .member-add-btn { background: #22c55e; color: white; border: none; padding: 0 14px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 13px; }

        .skill-scroll-box { max-height: 260px; overflow-y: auto; padding-right: 2px; }
        .skill-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 8px 10px; border-radius: 5px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .skill-name { font-weight: bold; font-size: 13px; }
        .skill-checkboxes { display: flex; gap: 8px; }
        .skill-label { font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 3px; cursor: pointer; }
        .skill-checkbox { width: 15px; height: 15px; accent-color: #e60012; }
    </style>
</head>
<body>
<div class="app-container">
    
    <!-- 固定ヘッダー -->
    <div class="app-header-fixed">SYSTEM MONITOR</div>
    
    <!-- 🏁 タイトル文字廃止：レーシングインジケーターライン -->
    <div class="brand-indicator">
        <div class="line-black"></div>
        <div class="line-white"></div>
        <div class="line-red"></div>
    </div>
    
    <!-- 🗳️ 1直・2直のトグロパネル -->
    <div class="carbon-panel">
        <div class="section-title"><span>SELECT SHIFT MODE</span><span>▼</span></div>
        <div class="shift-select-container">
            <button class="shift-btn active" id="btn-shift1" onclick="selectShift(1)">1直 (A〜D)</button>
            <button class="shift-btn" id="btn-shift2" onclick="selectShift(2)">2直 (A〜C)</button>
        </div>
    </div>

    <!-- 📅 曜日設定コックピットパネル（横タブハイブリッドでスクロールゼロ化） -->
    <div class="carbon-panel">
        <div class="section-title"><span>WEEKLY PARAMETERS</span><span>SETUP</span></div>
        
        <!-- 曜日切り替えタブ -->
        <div class="day-tabs">
            <div class="day-tab-item active" id="tab-MON" onclick="switchDayTab('MON')">月</div>
            <div class="day-tab-item" id="tab-TUE" onclick="switchDayTab('TUE')">火</div>
            <div class="day-tab-item" id="tab-WED" onclick="switchDayTab('WED')">水</div>
            <div class="day-tab-item" id="tab-THU" onclick="switchDayTab('THU')">木</div>
            <div class="day-tab-item" id="tab-FRI" onclick="switchDayTab('FRI')">金</div>
        </div>
        
        <!-- 各曜日の設定ドロップダウン（JSで自動生成されます） -->
        <div id="day-contents-root"></div>

        <!-- 🔰 教育枠表示スイッチ -->
        <label class="edu-toggle-bar">
            <input type="checkbox" class="edu-checkbox" id="toggle-edu-view" onchange="toggleEduVisibility()">
            🔰 教育枠 (見習い欄) を有効化する
        </label>
    </div>

    <!-- 🚀 作成ボタン（スターターボタン風） -->
    <button class="engine-start-btn" onclick="generateSchedule()">⚡ START PATTERN GENERATE</button>

    <!-- 🏁 完成版ホワイトボード（ボタンを押すとこの直下に出現） -->
    <div class="whiteboard-container" id="whiteboard">
        <div class="wb-header">
            <div class="wb-badge" id="wb-shift-label">1直</div>
            <div class="wb-title">WEEKLY SCHEDULE</div>
            <div style="width: 40px;"></div>
        </div>
        <table class="wb-table">
            <thead><tr id="wb-thead-tr"></tr></thead>
            <tbody id="wb-tbody"></tbody>
        </table>
        <div class="wb-footer"><span class="wb-footer-title">MEMBER</span><span id="wb-member-list"></span></div>
    </div>

    <!-- 🛠️ 管理系ショートカット -->
    <div class="shortcut-grid">
        <div class="shortcut-item" onclick="openModal('member')">👥 メンバー設定 ＞</div>
        <div class="shortcut-item" onclick="openModal('skill')">🎓 スキルマップ ＞</div>
    </div>

    <!-- 👥 ポップアップ：メンバー管理 -->
    <div class="modal-overlay" id="modal-member" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <h3 style="margin-bottom: 12px; border-left: 3px solid #e60012; padding-left: 6px; font-size: 15px;">👥 メンバー管理</h3>
            <div class="section-title"><span>CURRENT TEAM</span></div>
            <div class="member-list-tags" id="member-tags-container"></div>
            <div class="member-input-group">
                <input type="text" class="member-input" id="new-member-name" placeholder="登録名を入力">
                <button class="member-add-btn" onclick="addMember()">追加</button>
            </div>
            <button class="modal-close" onclick="closeModal('member')">CLOSE</button>
        </div>
    </div>

    <!-- ⚙️ ポップアップ：スキル管理 -->
    <div class="modal-overlay" id="modal-skill" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px; border-left: 3px solid #e60012; padding-left: 6px; font-size: 15px;">⚙️ スキル管理</h3>
            <div class="shift-select-container" style="margin-bottom: 10px;">
                <button class="shift-btn active" id="btn-skill-shift1" onclick="selectSkillShift(1)" style="padding: 8px; font-size: 12px;">1直</button>
                <button class="shift-btn" id="btn-skill-shift2" onclick="selectSkillShift(2)" style="padding: 8px; font-size: 12px;">2直</button>
            </div>
            <div class="skill-scroll-box" id="skill-list-container"></div>
            <button class="modal-close" onclick="closeModal('skill')">CLOSE</button>
        </div>
    </div>

    <!-- ボトムナビゲーション -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="window.scrollTo({top:0, behavior:'smooth'})">🏁<br>DRIVE</div>
        <div class="tab-item" onclick="openModal('member')">👥<br>TEAM</div>
        <div class="tab-item" onclick="openModal('skill')">⚙️<br>SKILL</div>
    </div>
</div>

<script {nonce}>
    let currentShift = 1;
    let skillShift = 1;
    let activeDayTab = 'MON';
    
    let members = ["阿部", "久林", "森上", "岡", "瑠衣", "西村"];
    let memberSkills = {
        "阿部": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "久林": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "森上": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "岡":   { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "瑠衣": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] },
        "西村": { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] }
    };

    if (localStorage.getItem("gr_members")) members = JSON.parse(localStorage.getItem("gr_members"));
    if (localStorage.getItem("gr_skills")) memberSkills = JSON.parse(localStorage.getItem("gr_skills"));

    function saveToStorage() {
        localStorage.setItem("gr_members", JSON.stringify(members));
        localStorage.setItem("gr_skills", JSON.stringify(memberSkills));
    }

    function openModal(id) {
        document.getElementById(`modal-${id}`).style.display = 'flex';
        if (id === 'member') updateMemberUI();
        if (id === 'skill') renderSkillUI();
    }
    function closeModal(id) { document.getElementById(`modal-${id}`).style.display = 'none'; }
    function closeModalOnOverlay(e) { if (e.target.classList.contains('modal-overlay')) { e.target.style.display = 'none'; } }

    // 📅 劇的改善：曜日タブの切り替え
    function switchDayTab(day) {
        activeDayTab = day;
        document.querySelectorAll('.day-tab-item').forEach(tab => {
            tab.classList.toggle('active', tab.id === `tab-${day}`);
        });
        document.querySelectorAll('.day-content-panel').forEach(panel => {
            panel.classList.toggle('active', panel.id === `panel-${day}`);
        });
    }

    function toggleEduVisibility() {
        const isChecked = document.getElementById('toggle-edu-view').checked;
        document.querySelectorAll('.edu-sub-row').forEach(row => {
            row.style.display = isChecked ? 'flex' : 'none';
        });
    }

    function renderDaySettings() {
        const root = document.getElementById('day-contents-root');
        root.innerHTML = '';
        const days = ["MON", "TUE", "WED", "THU", "FRI"];
        const jpDays = ["月曜日", "火曜日", "水曜日", "木曜日", "金曜日"];
        
        days.forEach((day, i) => {
            root.innerHTML += `
                <div class="day-content-panel ${day === activeDayTab ? 'active' : ''}" id="panel-${day}">
                    <div class="setting-row">
                        <div class="setting-label">${jpDays[i]} の休みメンバー（2人まで）</div>
                        <div class="select-group">
                            <select class="select-box absent-select" data-day="${day}" data-index="1"></select>
                            <select class="select-box absent-select" data-day="${day}" data-index="2"></select>
                        </div>
                    </div>
                    <div class="setting-row edu-sub-row" style="display: none;">
                        <div class="setting-label">🔰 教育指定（ポジション / メンバー）</div>
                        <div class="select-group">
                            <select class="select-box edu-pos" data-day="${day}">
                                <option value="">なし</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                            <select class="select-box edu-member" data-day="${day}"></select>
                        </div>
                    </div>
                </div>
            `;
        });
        updateMemberUI();
        toggleEduVisibility();
    }

    function selectSkillShift(shift) {
        skillShift = shift;
        document.getElementById('btn-skill-shift1').classList.toggle('active', shift === 1);
        document.getElementById('btn-skill-shift2').classList.toggle('active', shift === 2);
        renderSkillUI();
    }

    function renderSkillUI() {
        const container = document.getElementById('skill-list-container');
        container.innerHTML = '';
        members.forEach(m => {
            const currentSkills = memberSkills[m][skillShift] || [];
            let checkboxHTML = ["A", "B", "C", "D"].map(pos => {
                if (skillShift === 2 && pos === "D") return "";
                return `<label class="skill-label"><input type="checkbox" class="skill-checkbox" ${currentSkills.includes(pos) ? "checked" : ""} onchange="toggleSkill('${m}', '${pos}')"> ${pos}</label>`;
            }).join('');
            container.innerHTML += `<div class="skill-row"><div class="skill-name">${m}</div><div class="skill-checkboxes">${checkboxHTML}</div></div>`;
        });
    }

    function toggleSkill(name, pos) {
        let list = memberSkills[name][skillShift] || [];
        memberSkills[name][skillShift] = list.includes(pos) ? list.filter(p => p !== pos) : [...list, pos];
        saveToStorage();
    }

    function updateMemberUI() {
        const tags = document.getElementById('member-tags-container');
        if (tags) {
            tags.innerHTML = '';
            members.forEach((m, idx) => { tags.innerHTML += `<div class="member-tag-item">${m}<button class="member-delete-btn" onclick="removeMember(${idx})">×</button></div>`; });
        }
        document.querySelectorAll('.absent-select, .edu-member').forEach(s => {
            const val = s.value;
            s.innerHTML = '<option value="">なし</option>' + members.map(m => `<option value="${m}">${m}</option>`).join('');
            s.value = members.includes(val) ? val : "";
        });
        document.getElementById('wb-member-list').innerText = members.join('・');
    }

    function addMember() {
        const name = document.getElementById('new-member-name').value.trim();
        if (name && !members.includes(name)) {
            members.push(name);
            memberSkills[name] = { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] };
            document.getElementById('new-member-name').value = '';
            updateMemberUI();
            saveToStorage();
        }
    }

    function removeMember(idx) {
        if (members.length > 1) {
            delete memberSkills[members[idx]];
            members.splice(idx, 1);
            updateMemberUI();
            saveToStorage();
        }
    }

    function selectShift(shift) {
        currentShift = shift;
        document.getElementById('btn-shift1').classList.toggle('active', shift === 1);
        document.getElementById('btn-shift2').classList.toggle('active', shift === 2);
    }

    function swapMagnet(day, pos, index, currentName) {
        const select1 = document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`).value;
        const select2 = document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`).value;
        const absentMembers = [select1, select2].filter(m => m !== "");
        const activeMembers = members.filter(m => !absentMembers.includes(m) && m !== currentName);
        
        if (activeMembers.length === 0) { alert("代わりになれるメンバーがいません。"); return; }
        const newName = prompt(`${day}の${pos}を、${currentName}から誰に入れ替えますか？`, activeMembers[0]);
        
        if (newName && activeMembers.includes(newName)) {
            const target = document.getElementById(`mag-${day}-${pos}-${index}`);
            if (target) {
                const isEdu = target.innerText.includes('🔰');
                target.innerText = isEdu ? `🔰 ${newName}` : newName;
            }
        }
    }

    function generateSchedule() {
        const tbody = document.getElementById('wb-tbody');
        const theadTr = document.getElementById('wb-thead-tr');
        const days = ["MON", "TUE", "WED", "THU", "FRI"];
        tbody.innerHTML = '';
        document.getElementById('wb-shift-label').innerText = currentShift + '直';
        const positionNames = currentShift === 1 ? ["A", "B", "C", "D"] : ["A", "B", "C"];
        theadTr.innerHTML = '<th class="day-header"></th>' + positionNames.map(p => `<th>${p}</th>`).join('');
        
        const basePattern = (currentShift === 1) ? 
            { "MON": [0,1,2,3], "TUE": [1,3,5,2], "WED": [5,2,0,1], "THU": [2,5,3,0], "FRI": [3,0,1,5] } :
            { "MON": [3,2,4], "TUE": [1,0,2], "WED": [4,3,0], "THU": [0,1,4], "FRI": [2,1,3] };
        
        days.forEach(day => {
            const tr = document.createElement('tr');
            const tdDay = document.createElement('td');
            tdDay.className = 'day-cell'; tdDay.innerText = day; tr.appendChild(tdDay);
            
            const select1 = document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`).value;
            const select2 = document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`).value;
            const absentMembers = [select1, select2].filter(m => m !== "");
            const activeMembers = members.filter(m => !absentMembers.includes(m));
            
            const isEduVisible = document.getElementById('toggle-edu-view').checked;
            const eduPos = isEduVisible ? document.querySelector(`.edu-pos[data-day="${day}"]`).value : "";
            const eduMember = isEduVisible ? document.querySelector(`.edu-member[data-day="${day}"]`).value : "";
            
            let assignments = {}; positionNames.forEach(pos => assignments[pos] = []);
            let normalPool = activeMembers.filter(m => m !== eduMember);
            let indices = basePattern[day] || [0,1,2,3];
            
            positionNames.forEach((pos, i) => {
                if (normalPool.length > 0) {
                    let m = normalPool[indices[i] % normalPool.length];
                    if (memberSkills[m] && memberSkills[m][currentShift] && memberSkills[m][currentShift].includes(pos)) {
                        assignments[pos].push({ name: m, isEdu: false });
                    }
                }
            });
            positionNames.forEach(pos => {
                if (assignments[pos].length === 0) {
                    let c = normalPool.find(m => !assignments[pos].some(a => a.name === m) && memberSkills[m][currentShift] && memberSkills[m][currentShift].includes(pos));
                    assignments[pos].push({ name: c || "調整要", isEdu: false });
                }
            });
            if (eduPos && eduMember && positionNames.includes(eduPos)) {
                positionNames.forEach(pos => assignments[pos] = assignments[pos].filter(item => item.name !== eduMember));
                assignments[eduPos].push({ name: eduMember, isEdu: true });
            }
            positionNames.forEach(pos => {
                const td = document.createElement('td');
                assignments[pos].forEach((item, idx) => {
                    const span = document.createElement('span');
                    span.id = `mag-${day}-${pos}-${idx}`;
                    span.className = 'magnet-tag' + (item.isEdu ? ' education' : '');
                    span.innerText = item.isEdu ? `🔰 ${item.name}` : item.name;
                    span.onclick = () => swapMagnet(day, pos, idx, item.name);
                    td.appendChild(span);
                });
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        
        document.getElementById('whiteboard').style.display = 'block';
    }

    renderDaySettings();
</script>
</body>
</html>
