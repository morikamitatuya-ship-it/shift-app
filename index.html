<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GR TRACK MANAGER - COMPLETE VERSION</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0b0b0b; color: #fff; padding: 20px; }
        .app-container { max-width: 500px; margin: 0 auto; }
        .glass { background: #1c1c1c; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .wb { background: #fff; color: #000; padding: 10px; border-radius: 5px; margin-top: 15px; width: 100%; border-collapse: collapse; }
        .wb th, .wb td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        .tag { display: block; background: #eee; padding: 4px; border-radius: 3px; font-weight: bold; margin: 2px; }
        .tag.edu { background: #fffbeb; border: 1px solid #fbbf24; color: #92400e; }
        .select { background: #333; color: #fff; padding: 5px; border-radius: 4px; width: 100%; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="glass">
        <h3>勤務選択</h3>
        <button id="b1" onclick="shift=1; renderUI()">1直</button>
        <button id="b2" onclick="shift=2; renderUI()">2直</button>
    </div>

    <div id="settings-area"></div>
    <button onclick="generate()" style="width:100%; padding:15px; background:#e60012; color:white; border:none; cursor:pointer;">早出表を作成する</button>
    <div id="result"></div>
</div>

<script>
    let shift = 1;
    const members = ["阿部", "久林", "森上", "岡", "瑠衣", "西村"];
    
    // 初期設定エリアの生成
    function renderUI() {
        const area = document.getElementById('settings-area');
        area.innerHTML = `<h4>曜日別設定</h4>`;
        ["MON","TUE","WED","THU","FRI"].forEach(d => {
            area.innerHTML += `
                <div class="glass">
                    <label>${d}</label>
                    <select class="select absent" data-day="${d}"><option value="">休みなし</option>${members.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
                    <div style="display:flex; gap:5px;">
                        <select class="select edu-pos" data-day="${d}"><option value="">教育枠</option>
                        ${(shift===1 ? ["A","B","C","D"] : ["A","B","C"]).map(p=>`<option value="${p}">${p}</option>`).join('')}</select>
                        <select class="select edu-mem" data-day="${d}"><option value="">対象者</option>${members.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
                    </div>
                </div>`;
        });
    }

    function generate() {
        const pos = shift === 1 ? ["A", "B", "C", "D"] : ["A", "B", "C"];
        let schedule = {};

        // 1. 通常配置
        ["MON","TUE","WED","THU","FRI"].forEach(d => {
            schedule[d] = {};
            const absent = document.querySelector(`.absent[data-day="${d}"]`).value;
            let pool = members.filter(m => m !== absent);
            pos.forEach(p => {
                let m = pool.splice(Math.floor(Math.random() * pool.length), 1)[0] || "－";
                schedule[d][p] = m;
            });
        });

        // 2. 教育枠（後入れ・スワップ）
        ["MON","TUE","WED","THU","FRI"].forEach(d => {
            const ep = document.querySelector(`.edu-pos[data-day="${d}"]`).value;
            const em = document.querySelector(`.edu-mem[data-day="${d}"]`).value;
            if(ep && em) {
                let current = schedule[d][ep];
                schedule[d][ep] = em;
                let other = pos.find(p => p !== ep);
                schedule[d][other] = current;
            }
        });

        // 3. 表示
        let html = `<table class="wb"><tr><th></th>${pos.map(p=>`<th>${p}</th>`).join('')}</tr>`;
        for(let d in schedule) {
            html += `<tr><td>${d}</td>` + pos.map(p => {
                const ep = document.querySelector(`.edu-pos[data-day="${d}"]`).value;
                const em = document.querySelector(`.edu-mem[data-day="${d}"]`).value;
                const isEdu = (p === ep && schedule[d][p] === em);
                return `<td><span class="tag ${isEdu?'edu':''}">${schedule[d][p]}</span></td>`;
            }).join('') + `</tr>`;
        }
        document.getElementById('result').innerHTML = html + `</table>`;
    }

    renderUI();
</script>
</body>
</html>
