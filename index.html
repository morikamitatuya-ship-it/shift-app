<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>GR TRACK MANAGER</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

<h1>
GR TRACK MANAGER
</h1>

<p>
Toyota Gazoo Racing Style
</p>

</header>

<section class="card">

<h2>
勤務選択
</h2>

<div class="shift-buttons">

<button id="shift1" class="active">
1直
</button>

<button id="shift2">
2直
</button>

</div>

</section>

<section class="card">

<h2>
👥 メンバー管理
</h2>

<p>
登録メンバーや追加・削除を行います
</p>

<button id="memberButton">

メンバー管理を開く

</button>

<div id="memberArea" style="display:none; margin-top:15px;">

<input
type="text"
id="memberName"
placeholder="名前を入力">

<button id="addMember">
追加
</button>

<div id="memberList"></div>

</div>

</section>

<section class="card">

<h2>
⚙️ スキル管理
</h2>

<p>
1直・2直ごとのスキルを設定します
</p>

<button id="skillButton">

スキル管理を開く

</button>

</section>

<section class="card">

<h2>
休み入力
</h2>

<div id="holidayArea">

</div>

</section>

<section class="card">

<h2>
教育
</h2>

<label>

<input
type="checkbox"
id="educationMode">

教育モードを使う

</label>

<div
id="educationArea">

</div>

</section>

<section class="card">

<button
id="createButton">

早出表を作成

</button>

<button
id="rerollButton">

🎲 再抽選

</button>

</section>

<section
id="whiteboard">

</section>

</div>

<script src="scheduler.js"></script>
<script src="script.js"></script>

</body>
</html>
