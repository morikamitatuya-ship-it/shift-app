<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GR TRACK MANAGER</title>
    </head>
<body>
    <script>
    // --- 1. 変数定義 ---
    let currentShift = 1; let skillShift = 1; let currentSwapContext = {};
    let members = JSON.parse(localStorage.getItem("gr_members")) || ["阿部", "久林", "森上", "岡", "瑠衣", "西村"];
    let memberSkills = JSON.parse(localStorage.getItem("gr_skills")) || {};
    members.forEach(m => { if(!memberSkills[m]) memberSkills[m] = { 1: ["A", "B", "C", "D"], 2: ["A", "B", "C"] }; });

    // --- 2. 既存機能（保存・UI制御） ---
    function saveToStorage() { localStorage.setItem("gr_members", JSON.stringify(members)); localStorage.setItem("gr_skills", JSON.stringify(memberSkills)); }
    function openModal(id) { document.getElementById(`modal-${id}`).style.display = 'flex'; if(id==='member') updateMemberUI(); if(id==='skill') renderSkillUI(); }
    function closeModal(id) { document.getElementById(`modal-${id}`).style.display = 'none'; }
    function closeModalOnOverlay(e) { if(e.target.classList.contains('modal-overlay')) e.target.style.display = 'none'; }
    function toggleEduVisibility() { const isChecked = document.getElementById('toggle-edu-view').checked; document.querySelectorAll('.setting-sub-row.edu-row').forEach(row => { row.style.display = isChecked ? 'flex' : 'none'; }); }

    // --- 3. 自動編成ロジック ---
    function generateSchedule() {
        const tbody = document.getElementById('wb-tbody'); tbody.innerHTML = '';
        const posNames = currentShift === 1 ? ["A", "B", "C", "D"] : ["A", "B", "C"];
        document.getElementById('wb-thead-tr').innerHTML = '<th class="day-header"></th>' + posNames.map(p => `<th>${p}</th>`).join('');
        document.getElementById('wb-shift-label').innerText = currentShift + "直";
        
        let weeklyCounts = {}; members.forEach(m => weeklyCounts[m] = 0);
        let lastDayAssignments = {}; 

        ["MON","TUE","WED","THU","FRI"].forEach(day => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="day-cell">${day}</td>` + posNames.map(() => "<td></td>").join('');
            tbody.appendChild(tr);

            const absent = [document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`)?.value || "", document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`)?.value || ""];
            const eduP = document.getElementById('toggle-edu-view').checked ? document.querySelector(`.edu-pos[data-day="${day}"]`)?.value : "";
            const eduM = document.getElementById('toggle-edu-view').checked ? document.querySelector(`.edu-member[data-day="${day}"]`)?.value : "";
            
            let assignedToday = [];
            if(eduM) assignedToday.push(eduM);

            posNames.forEach((pos, i) => {
                const td = tr.cells[i+1];
                if (eduP === pos && eduM) {
                    td.innerHTML = `<span class="magnet-tag education">🔰 ${eduM}</span>`;
                    lastDayAssignments[pos] = eduM;
                    return;
                }

                let candidates = members.filter(m => !absent.includes(m) && !assignedToday.includes(m) && m !== lastDayAssignments[pos] && memberSkills[m][currentShift]?.includes(pos));
                candidates.sort((a, b) => weeklyCounts[a] - weeklyCounts[b]);

                let m = candidates[0] || "－";
                if (m !== "－") { assignedToday.push(m); weeklyCounts[m]++; lastDayAssignments[pos] = m; }

                const span = document.createElement('span');
                span.className = 'magnet-tag'; span.innerText = m;
                span.onclick = () => swapMagnet(day, pos, 0, m);
                td.appendChild(span);
            });
        });
        document.getElementById('whiteboard').style.display = 'block';
    }

    // --- 4. その他の必須機能 ---
    function renderDaySettings() { const root = document.getElementById('day-settings-root'); root.innerHTML = ''; ["MON", "TUE", "WED", "THU", "FRI"].forEach((day, i) => { root.innerHTML += `<div class="day-row"><div class="day-label"><span>${day}</span> ${["月","火","水","木","金"][i]}曜日</div><div class="setting-sub-row"><div class="setting-sub-label">休み</div><div class="select-group"><select class="select-box absent-select" data-day="${day}" data-index="1"></select><select class="select-box absent-select" data-day="${day}" data-index="2"></select></div></div><div class="setting-sub-row edu-row" id="edu-row-${day}"><div class="setting-sub-label">教育枠</div><div class="select-group"><select class="select-box edu-pos" data-day="${day}"><option value="">なし</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select><select class="select-box edu-member" data-day="${day}"></select></div></div></div>`; }); updateMemberUI(); }
    function selectSkillShift(s) { skillShift = s; document.getElementById('btn-skill-shift1').classList.toggle('active', s===1); document.getElementById('btn-skill-shift2').classList.toggle('active', s===2); renderSkillUI(); }
    function renderSkillUI() { const container = document.getElementById('skill-list-container'); container.innerHTML = ''; members.forEach(m => { let html = ["A", "B", "C", "D"].map(pos => { if(skillShift===2 && pos==="D") return ""; return `<label class="skill-label"><input type="checkbox" class="skill-checkbox" ${memberSkills[m][skillShift].includes(pos)?"checked":""} onchange="toggleSkill('${m}', '${pos}')"> ${pos}</label>`; }).join(''); container.innerHTML += `<div class="skill-row"><div class="skill-name">${m}</div><div class="skill-checkboxes">${html}</div></div>`; }); }
    function toggleSkill(n, p) { let l = memberSkills[n][skillShift]; memberSkills[n][skillShift] = l.includes(p) ? l.filter(x=>x!==p) : [...l, p]; saveToStorage(); }
    function updateMemberUI() { const tags = document.getElementById('member-tags-container'); tags.innerHTML = ''; members.forEach((m, i) => tags.innerHTML += `<div class="member-tag-item">${m}<button class="member-delete-btn" onclick="removeMember(${i})">×</button></div>`); document.querySelectorAll('.absent-select, .edu-member').forEach(s => { const val = s.value; s.innerHTML = '<option value="">なし</option>' + members.map(m=>`<option value="${m}">${m}</option>`).join(''); s.value = members.includes(val) ? val : ""; }); document.getElementById('wb-member-list').innerText = members.join('・'); }
    function addMember() { const name = document.getElementById('new-member-name').value.trim(); if(name && !members.includes(name)) { members.push(name); memberSkills[name] = {1:["A","B","C","D"], 2:["A","B","C"]}; document.getElementById('new-member-name').value = ''; updateMemberUI(); saveToStorage(); } }
    function removeMember(i) { if(members.length > 1) { delete memberSkills[members[i]]; members.splice(i, 1); updateMemberUI(); saveToStorage(); } }
    function selectShift(s) { currentShift = s; document.getElementById('btn-shift1').classList.toggle('active', s===1); document.getElementById('btn-shift2').classList.toggle('active', s===2); document.getElementById('wb-shift-label').innerText = s+"直"; }
    function swapMagnet(day, pos, index, currentName) { const absent = [document.querySelector(`.absent-select[data-day="${day}"][data-index="1"]`).value, document.querySelector(`.absent-select[data-day="${day}"][data-index="2"]`).value]; const candidates = members.filter(m => !absent.includes(m) && m !== currentName); if(candidates.length === 0) return; currentSwapContext = { targetId: `mag-${day}-${pos}-${index}` }; const container = document.getElementById('swap-list-container'); container.innerHTML = candidates.map(m => `<button class="member-tag-item" style="width:100%; justify-content:center;" onclick="executeSwap('${m}')">${m}</button>`).join(''); openModal('swap'); }
    function executeSwap(n) { const target = document.getElementById(currentSwapContext.targetId); if(target) target.innerText = target.innerText.includes('🔰') ? `🔰 ${n}` : n; closeModal('swap'); }
    
    renderDaySettings();
</script>
